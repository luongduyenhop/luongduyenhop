name: Generate Snake Animation

on:
  # Tự động chạy vào 0h mỗi ngày để cập nhật biểu đồ
  schedule:
    - cron: "0 0 * * *"
  # Cho phép bạn bấm nút chạy thủ công bất cứ lúc nào
  workflow_dispatch:
  # Tự động chạy mỗi khi bạn có cập nhật mới lên nhánh main
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Bước 1: Checkout lại code trong repository của bạn
      - name: Checkout repository
        uses: actions/checkout@v3

      # Bước 2: Gọi công cụ tạo Rắn từ Platane/snk
      - name: Generate Snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          # Tự động lấy tên tài khoản GitHub của bạn
          github_user_name: ${{ github.repository_owner }}
          # Xuất ra 2 file ảnh (bản sáng và bản tối) vào thư mục dist
          outputs: |
            dist/grid-snake.svg
            dist/grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Bước 3: Đẩy file ảnh vừa tạo ngược lại lên repository
      - name: Commit & Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add dist/grid-snake.svg dist/grid-snake-dark.svg
          git commit -m "Update grid-snake.svg animation" || exit 0
          git push
